<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Claude Code Rate Watcher</title>
<style>
  :root {
    --green: #30D158;
    --bg: #0a0a0a;
    --card: #1c1c1e;
    --text: #f5f5f7;
    --text-secondary: #86868b;
    --border: #333;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .check {
    width: 80px;
    height: 80px;
    margin: 0 auto 28px;
  }
  h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .desc {
    font-size: 1.05rem;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }
  .steps {
    text-align: left;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 28px;
  }
  .steps h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .steps ol {
    list-style: none;
    counter-reset: step;
    padding: 0;
  }
  .steps li {
    counter-increment: step;
    position: relative;
    padding-left: 32px;
    margin-bottom: 12px;
    font-size: 0.92rem;
  }
  .steps li:last-child { margin-bottom: 0; }
  .steps li::before {
    content: counter(step);
    position: absolute;
    left: 0;
    width: 22px;
    height: 22px;
    background: var(--green);
    color: #000;
    border-radius: 50%;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .steps code {
    display: block;
    background: #111;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 6px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.82rem;
    color: var(--green);
  }
  .back-link {
    color: var(--green);
    text-decoration: none;
    font-size: 0.9rem;
  }
  .back-link:hover { text-decoration: underline; }
  .retry {
    display: inline-block;
    margin-bottom: 16px;
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
  .retry a {
    color: var(--green);
    text-decoration: none;
  }
  .retry a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="check">
    <svg viewBox="0 0 80 80" fill="none">
      <circle cx="40" cy="40" r="38" stroke="#30D158" stroke-width="4"/>
      <path d="M24 40l12 12 20-24" stroke="#30D158" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1 data-i18n="title"></h1>
  <p class="desc" data-i18n="desc"></p>

  <div class="steps">
    <h2 data-i18n="steps-title"></h2>
    <ol>
      <li data-i18n="s1"></li>
      <li data-i18n="s2"></li>
      <li><span data-i18n="s3"></span><code>xattr -cr "/Applications/Claude Code Rate Watcher.app"</code></li>
      <li data-i18n="s4"></li>
    </ol>
  </div>

  <p class="retry" data-i18n="retry"></p>
  <a class="back-link" href="./" data-i18n="back"></a>
</div>

<script>
const DOWNLOAD_URL = "https://github.com/NicoValentine7/claude-code-rate-watcher/releases/latest/download/claude-code-rate-watcher.dmg";

const i18n = {
  en: {
    title: "Thank you!",
    desc: "Your download should start automatically.",
    "steps-title": "Next steps",
    s1: "Open the downloaded .dmg file.",
    s2: "Drag the app to the Applications folder.",
    s3: "If macOS blocks the app, run this in Terminal:",
    s4: "Launch the app — it appears in your menu bar.",
    retry: 'Download not starting? <a href="' + DOWNLOAD_URL + '">Click here</a>',
    back: "Back to home",
  },
  ja: {
    title: "ありがとうございます！",
    desc: "ダウンロードが自動的に開始されます。",
    "steps-title": "次のステップ",
    s1: "ダウンロードした .dmg ファイルを開く",
    s2: "アプリを Applications フォルダにドラッグ",
    s3: "macOS がブロックする場合、ターミナルで以下を実行：",
    s4: "アプリを起動 — メニューバーに表示されます",
    retry: 'ダウンロードが始まらない場合は<a href="' + DOWNLOAD_URL + '">こちら</a>',
    back: "ホームに戻る",
  }
};

function setLang(lang) {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key] !== undefined) el.innerHTML = i18n[lang][key];
  });
}

const saved = localStorage.getItem('lang');
setLang(saved === 'ja' ? 'ja' : 'en');

// Auto-trigger download via hidden link
setTimeout(() => {
  const a = document.createElement('a');
  a.href = DOWNLOAD_URL;
  a.download = '';
  document.body.appendChild(a);
  a.click();
  a.remove();
}, 500);
</script>

</body>
</html>
