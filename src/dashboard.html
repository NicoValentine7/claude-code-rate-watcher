<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: #1a1a1c;
    color: #fff;
    -webkit-user-select: none;
    user-select: none;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 0.5px solid rgba(255,255,255,0.06);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-title {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }

  /* Account section */
  .account {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .account-email {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
  }

  .account-provider {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.06);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .btn {
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn:hover { opacity: 0.85; }
  .btn:active { opacity: 0.7; }

  .btn-github {
    background: #333;
    color: #fff;
  }

  .btn-google {
    background: #4285f4;
    color: #fff;
  }

  .btn-logout {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
  }

  .login-buttons {
    display: flex;
    gap: 8px;
  }

  /* Time range selector */
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
  }

  .range-btn {
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    color: rgba(255,255,255,0.4);
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .range-btn.active {
    color: #fff;
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
  }

  .range-btn:hover:not(.active) {
    color: rgba(255,255,255,0.7);
    border-color: rgba(255,255,255,0.15);
  }

  /* Chart area */
  .chart-container {
    padding: 8px 24px 24px;
    position: relative;
  }

  .chart-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: rgba(255,255,255,0.85);
  }

  .chart-wrapper {
    position: relative;
    height: 280px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    border: 0.5px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .chart-wrapper svg {
    width: 100%;
    height: 100%;
  }

  .chart-legend {
    display: flex;
    gap: 20px;
    padding: 10px 0 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Peak section */
  .peaks-section {
    padding: 0 24px 24px;
  }

  .peaks-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: rgba(255,255,255,0.85);
  }

  .peaks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
    gap: 4px;
  }

  .peak-bar-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .peak-bar-track {
    width: 100%;
    height: 80px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
  }

  .peak-bar-fill {
    width: 100%;
    border-radius: 4px 4px 0 0;
    transition: height 0.3s;
  }

  .peak-bar-label {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
  }

  .peak-bar-value {
    font-size: 11px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: rgba(255,255,255,0.3);
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .empty-text {
    font-size: 14px;
    margin-bottom: 4px;
  }

  .empty-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
  }

  /* Colors */
  .color-safe { color: #30D158; }
  .color-warning { color: #FF9F0A; }
  .color-danger { color: #FF453A; }
  .bg-safe { background: #30D158; }
  .bg-warning { background: #FF9F0A; }
  .bg-danger { background: #FF453A; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Usage History</span>
    <span class="header-sub">Rate limit utilization over time</span>
  </div>
  <div class="account" id="account-section">
    <div class="login-buttons" id="login-buttons">
      <button class="btn btn-github" onclick="window.ipc.postMessage('login_github')">GitHub</button>
      <button class="btn btn-google" onclick="window.ipc.postMessage('login_google')">Google</button>
    </div>
    <div id="account-info" style="display:none">
      <span class="account-email" id="account-email"></span>
      <span class="account-provider" id="account-provider"></span>
      <button class="btn btn-logout" onclick="window.ipc.postMessage('logout')">Logout</button>
    </div>
  </div>
</div>

<div class="controls">
  <button class="range-btn active" onclick="setRange('24h')" id="range-24h">24h</button>
  <button class="range-btn" onclick="setRange('7d')" id="range-7d">7d</button>
  <button class="range-btn" onclick="setRange('30d')" id="range-30d">30d</button>
</div>

<div class="chart-container">
  <div class="chart-title">Usage Over Time</div>
  <div class="chart-wrapper" id="chart-wrapper">
    <svg id="chart-svg" viewBox="0 0 760 280" preserveAspectRatio="none"></svg>
  </div>
  <div class="chart-legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#5AC8FA"></div>
      <span>5-Hour Window</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#BF5AF2"></div>
      <span>Weekly Limit</span>
    </div>
  </div>
</div>

<div class="peaks-section">
  <div class="peaks-title">Peak Usage per Window Reset</div>
  <div id="peaks-container">
    <div class="empty-state" id="peaks-empty">
      <div class="empty-icon">&#x1F4CA;</div>
      <div class="empty-text">No history data yet</div>
      <div class="empty-sub">Login and let the app run to start recording</div>
    </div>
    <div class="peaks-grid" id="peaks-grid" style="display:none"></div>
  </div>
</div>

<script>
var historyData = [];
var currentRange = '24h';

function setLoggedIn(email, provider) {
  document.getElementById('login-buttons').style.display = 'none';
  var info = document.getElementById('account-info');
  info.style.display = 'flex';
  info.style.gap = '10px';
  info.style.alignItems = 'center';
  document.getElementById('account-email').textContent = email;
  document.getElementById('account-provider').textContent = provider;
}

function setLoggedOut() {
  document.getElementById('login-buttons').style.display = 'flex';
  document.getElementById('account-info').style.display = 'none';
}

function loadHistory(data) {
  historyData = data || [];
  renderChart();
  renderPeaks();
}

function setRange(range) {
  currentRange = range;
  document.querySelectorAll('.range-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  document.getElementById('range-' + range).classList.add('active');
  renderChart();
}

function statusColor(pct) {
  if (pct >= 90) return '#FF453A';
  if (pct >= 70) return '#FF9F0A';
  return '#30D158';
}

function filterByRange(data, range) {
  var now = new Date();
  var cutoff;
  switch (range) {
    case '24h': cutoff = new Date(now - 24 * 3600 * 1000); break;
    case '7d':  cutoff = new Date(now - 7 * 24 * 3600 * 1000); break;
    case '30d': cutoff = new Date(now - 30 * 24 * 3600 * 1000); break;
    default: cutoff = new Date(now - 24 * 3600 * 1000);
  }
  return data.filter(function(d) { return new Date(d.recorded_at) >= cutoff; });
}

function renderChart() {
  var svg = document.getElementById('chart-svg');
  var filtered = filterByRange(historyData, currentRange);

  if (filtered.length < 2) {
    svg.innerHTML = '<text x="380" y="140" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="14" font-family="-apple-system,sans-serif">Not enough data for this range</text>';
    return;
  }

  var w = 760, h = 280;
  var padL = 40, padR = 10, padT = 10, padB = 30;
  var chartW = w - padL - padR;
  var chartH = h - padT - padB;

  var minTime = new Date(filtered[0].recorded_at).getTime();
  var maxTime = new Date(filtered[filtered.length - 1].recorded_at).getTime();
  var timeRange = maxTime - minTime || 1;

  function x(t) { return padL + ((t - minTime) / timeRange) * chartW; }
  function y(pct) { return padT + chartH - (pct / 100) * chartH; }

  var svgContent = '';

  // Zone backgrounds
  svgContent += '<rect x="' + padL + '" y="' + y(100) + '" width="' + chartW + '" height="' + (y(90) - y(100)) + '" fill="rgba(255,59,48,0.05)"/>';
  svgContent += '<rect x="' + padL + '" y="' + y(90) + '" width="' + chartW + '" height="' + (y(70) - y(90)) + '" fill="rgba(255,159,10,0.04)"/>';

  // Grid lines
  for (var p = 0; p <= 100; p += 25) {
    var yy = y(p);
    svgContent += '<line x1="' + padL + '" y1="' + yy + '" x2="' + (w - padR) + '" y2="' + yy + '" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>';
    svgContent += '<text x="' + (padL - 6) + '" y="' + (yy + 4) + '" text-anchor="end" fill="rgba(255,255,255,0.25)" font-size="10" font-family="-apple-system,sans-serif">' + p + '%</text>';
  }

  // Threshold lines
  svgContent += '<line x1="' + padL + '" y1="' + y(70) + '" x2="' + (w - padR) + '" y2="' + y(70) + '" stroke="rgba(255,159,10,0.3)" stroke-width="0.5" stroke-dasharray="4,4"/>';
  svgContent += '<line x1="' + padL + '" y1="' + y(90) + '" x2="' + (w - padR) + '" y2="' + y(90) + '" stroke="rgba(255,59,48,0.3)" stroke-width="0.5" stroke-dasharray="4,4"/>';

  // 5h line
  var path5h = '';
  for (var i = 0; i < filtered.length; i++) {
    var t = new Date(filtered[i].recorded_at).getTime();
    var px = x(t);
    var py = y(filtered[i].five_hour_percent);
    path5h += (i === 0 ? 'M' : 'L') + px.toFixed(1) + ',' + py.toFixed(1);
  }
  svgContent += '<path d="' + path5h + '" fill="none" stroke="#5AC8FA" stroke-width="2" stroke-linejoin="round"/>';

  // 7d line
  var path7d = '';
  for (var i = 0; i < filtered.length; i++) {
    var t = new Date(filtered[i].recorded_at).getTime();
    var px = x(t);
    var py = y(filtered[i].seven_day_percent);
    path7d += (i === 0 ? 'M' : 'L') + px.toFixed(1) + ',' + py.toFixed(1);
  }
  svgContent += '<path d="' + path7d + '" fill="none" stroke="#BF5AF2" stroke-width="1.5" stroke-linejoin="round" stroke-dasharray="4,3"/>';

  // Time axis labels
  var labelCount = currentRange === '24h' ? 6 : currentRange === '7d' ? 7 : 10;
  for (var i = 0; i <= labelCount; i++) {
    var t = minTime + (timeRange / labelCount) * i;
    var d = new Date(t);
    var label;
    if (currentRange === '24h') {
      label = d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
    } else {
      label = (d.getMonth() + 1) + '/' + d.getDate();
    }
    var lx = x(t);
    svgContent += '<text x="' + lx.toFixed(1) + '" y="' + (h - 6) + '" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="10" font-family="-apple-system,sans-serif">' + label + '</text>';
  }

  svg.innerHTML = svgContent;
}

function renderPeaks() {
  var peaks = historyData.filter(function(d) { return d.snapshot_type === 'window_reset'; });
  var grid = document.getElementById('peaks-grid');
  var empty = document.getElementById('peaks-empty');

  if (peaks.length === 0) {
    empty.style.display = '';
    grid.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  grid.style.display = '';

  // Show last 30 peaks max
  var display = peaks.slice(-30);
  var html = '';

  for (var i = 0; i < display.length; i++) {
    var p = display[i];
    var pct = p.five_hour_percent;
    var color = statusColor(pct);
    var d = new Date(p.recorded_at);
    var label = (d.getMonth() + 1) + '/' + d.getDate();

    html += '<div class="peak-bar-container">';
    html += '<div class="peak-bar-value" style="color:' + color + '">' + pct + '%</div>';
    html += '<div class="peak-bar-track"><div class="peak-bar-fill" style="height:' + Math.max(pct, 2) + '%;background:' + color + '"></div></div>';
    html += '<div class="peak-bar-label">' + label + '</div>';
    html += '</div>';
  }

  grid.innerHTML = html;
}

// Initial render
renderChart();
renderPeaks();
</script>
</body>
</html>
