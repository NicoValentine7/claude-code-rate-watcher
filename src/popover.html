<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: transparent;
    color: #fff;
    -webkit-user-select: none;
    user-select: none;
    padding: 8px;
  }

  .popover {
    background: rgba(36, 36, 38, 0.96);
    border-radius: 12px;
    border: 0.5px solid rgba(255, 255, 255, 0.08);
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }

  /* Header */
  .header {
    padding: 16px 16px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(48, 209, 88, 0.18);
    color: #30D158;
  }

  /* Section */
  .section {
    padding: 0 16px 16px;
  }

  .section + .section {
    border-top: 0.5px solid rgba(255, 255, 255, 0.06);
    padding-top: 14px;
  }

  .section-header {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .section-icon {
    font-size: 14px;
    margin-right: 8px;
    opacity: 0.7;
  }

  .section-label {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.85);
    flex: 1;
  }

  .section-value {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }

  .section-value.safe { color: #30D158; }
  .section-value.warning { color: #FF9F0A; }
  .section-value.danger { color: #FF453A; }

  /* Progress bar */
  .progress-track {
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease, background-color 0.4s ease;
    min-width: 0;
  }

  .progress-fill.safe { background: #30D158; }
  .progress-fill.warning { background: #FF9F0A; }
  .progress-fill.danger { background: #FF453A; }

  .reset-text {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
  }

  .sub-stats {
    display: flex;
    justify-content: space-between;
  }

  /* Token details */
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 12.5px;
  }

  .detail-label {
    color: rgba(255, 255, 255, 0.55);
  }

  .detail-value {
    color: rgba(255, 255, 255, 0.85);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .detail-row.total {
    border-top: 0.5px solid rgba(255, 255, 255, 0.06);
    margin-top: 4px;
    padding-top: 8px;
  }

  .detail-row.total .detail-label,
  .detail-row.total .detail-value {
    color: #fff;
    font-weight: 600;
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-top: 0.5px solid rgba(255, 255, 255, 0.06);
  }

  .updated {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
  }

  .footer-actions {
    display: flex;
    gap: 16px;
  }

  .footer-btn {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    padding: 2px 0;
    transition: color 0.15s;
  }

  .footer-btn:hover {
    color: rgba(255, 255, 255, 0.8);
  }
</style>
</head>
<body>
  <div class="popover">
    <div class="header">
      <span class="header-title">Claude Code</span>
      <span class="badge" id="plan-badge">Max</span>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon">&#x23F1;</span>
        <span class="section-label">5-Hour Window</span>
        <span class="section-value safe" id="pct-value">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill safe" id="progress-bar" style="width: 0%"></div>
      </div>
      <div class="reset-text" id="reset-text">No active session</div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon">&#x1F4C5;</span>
        <span class="section-label">Weekly Limit</span>
        <span class="section-value safe" id="weekly-pct-value">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill safe" id="weekly-progress-bar" style="width: 0%"></div>
      </div>
      <div class="sub-stats">
        <span class="reset-text" id="weekly-reset-text">No activity</span>
        <span class="reset-text" id="weekly-tokens-text"></span>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-icon">&#x1F4CA;</span>
        <span class="section-label">Token Usage (5h)</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Input</span>
        <span class="detail-value" id="val-input">0</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Output</span>
        <span class="detail-value" id="val-output">0</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Cache Write</span>
        <span class="detail-value" id="val-cache-write">0</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Cache Read</span>
        <span class="detail-value" id="val-cache-read">0</span>
      </div>
      <div class="detail-row total">
        <span class="detail-label">Total</span>
        <span class="detail-value" id="val-total">0</span>
      </div>
    </div>

    <div class="footer">
      <span class="updated" id="updated-text">Updated just now</span>
      <div class="footer-actions">
        <button class="footer-btn" id="btn-quit" onclick="window.ipc.postMessage('quit')">Quit</button>
      </div>
    </div>
  </div>

<script>
function formatTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function statusClass(pct) {
  if (pct >= 90) return 'danger';
  if (pct >= 70) return 'warning';
  return 'safe';
}

function updateData(d) {
  var cls = statusClass(d.usage_percent);

  // Percentage
  var pctEl = document.getElementById('pct-value');
  pctEl.textContent = d.usage_percent + '%';
  pctEl.className = 'section-value ' + cls;

  // Progress bar
  var bar = document.getElementById('progress-bar');
  bar.style.width = d.usage_percent + '%';
  bar.className = 'progress-fill ' + cls;

  // Reset text
  document.getElementById('reset-text').textContent =
    d.reset_text || 'No active session';

  // Token values
  document.getElementById('val-input').textContent = formatTokens(d.total_input_tokens);
  document.getElementById('val-output').textContent = formatTokens(d.total_output_tokens);
  document.getElementById('val-cache-write').textContent = formatTokens(d.total_cache_creation_tokens);
  document.getElementById('val-cache-read').textContent = formatTokens(d.total_cache_read_tokens);
  document.getElementById('val-total').textContent = formatTokens(d.total_tokens);

  // Weekly
  var wCls = statusClass(d.weekly_usage_percent);
  var wPctEl = document.getElementById('weekly-pct-value');
  wPctEl.textContent = d.weekly_usage_percent + '%';
  wPctEl.className = 'section-value ' + wCls;

  var wBar = document.getElementById('weekly-progress-bar');
  wBar.style.width = d.weekly_usage_percent + '%';
  wBar.className = 'progress-fill ' + wCls;

  document.getElementById('weekly-reset-text').textContent =
    d.weekly_reset_text || 'No activity';
  document.getElementById('weekly-tokens-text').textContent =
    formatTokens(d.weekly_total_tokens) + ' tokens \u00b7 ' + d.weekly_message_count + ' msgs';

  // Updated timestamp
  document.getElementById('updated-text').textContent = 'Updated just now';
}
</script>
</body>
</html>
