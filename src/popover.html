<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: transparent;
    color: #fff;
    -webkit-user-select: none;
    user-select: none;
  }

  .popover {
    position: relative;
    overflow: visible;
    background: #242426;
    border: none;
    outline: none;
    border-radius: 12px;
  }

  /* Header */
  .header {
    padding: 16px 16px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .badge.live {
    background: rgba(48, 209, 88, 0.18);
    color: #30D158;
  }

  .badge.connecting {
    background: rgba(255, 159, 10, 0.18);
    color: #FF9F0A;
  }

  /* Auth Required */
  .auth-required {
    display: none;
    padding: 32px 24px;
    text-align: center;
  }

  .auth-required.visible {
    display: block;
  }

  .auth-icon {
    font-size: 36px;
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .auth-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 6px;
    color: rgba(255, 255, 255, 0.9);
  }

  .auth-desc {
    font-size: 12.5px;
    color: rgba(255, 255, 255, 0.45);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .auth-btn {
    display: inline-block;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    color: #fff;
    background: #5856D6;
    border: none;
    border-radius: 8px;
    padding: 10px 28px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .auth-btn:hover {
    background: #6D6BEA;
  }

  .auth-btn:active {
    background: #4A48C4;
  }

  /* Connecting state */
  .connecting-state {
    display: none;
    padding: 16px 24px;
    text-align: center;
  }

  .connecting-state.visible {
    display: block;
  }

  .connecting-spinner {
    font-size: 20px;
    margin-bottom: 8px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .connecting-text {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.45);
  }

  .error-message {
    font-size: 12px;
    color: #FF453A;
    margin-top: 8px;
  }

  .error-message.soft {
    color: rgba(255, 255, 255, 0.45);
  }

  .relogin-btn {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    color: #A5A4F3;
    background: rgba(88, 86, 214, 0.15);
    border: 0.5px solid rgba(88, 86, 214, 0.3);
    border-radius: 6px;
    padding: 6px 14px;
    margin-top: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .relogin-btn:hover {
    background: rgba(88, 86, 214, 0.25);
  }

  .error-detail-toggle {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.3);
    cursor: pointer;
    margin-top: 6px;
    background: none;
    border: none;
    font-family: inherit;
    padding: 0;
    transition: color 0.15s;
  }

  .error-detail-toggle:hover {
    color: rgba(255, 255, 255, 0.6);
  }

  .error-details {
    display: none;
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 6px;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.35);
    text-align: left;
    word-break: break-all;
    line-height: 1.5;
  }

  .error-details.visible {
    display: block;
  }

  /* Section */
  .usage-content {}

  .section {
    padding: 0 16px 16px;
  }

  .section + .section {
    border-top: 0.5px solid rgba(255, 255, 255, 0.06);
    padding-top: 14px;
  }

  .section-header {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .section-icon {
    font-size: 14px;
    margin-right: 8px;
    opacity: 0.7;
  }

  .section-label {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.85);
    flex: 1;
  }

  .section-value {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
  }

  .section-value.safe { color: #30D158; }
  .section-value.warning { color: #FF9F0A; }
  .section-value.danger { color: #FF453A; }

  /* Progress bar */
  .progress-track {
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease, background-color 0.4s ease;
    min-width: 0;
  }

  .progress-fill.safe { background: #30D158; }
  .progress-fill.warning { background: #FF9F0A; }
  .progress-fill.danger { background: #FF453A; }

  .reset-text {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.45);
  }

  .sub-stats {
    display: flex;
    justify-content: space-between;
  }

  /* Token details */
  .section-header.collapsible {
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .section-header.collapsible:hover {
    opacity: 0.8;
  }

  .section-header .chevron {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.3);
    transition: transform 0.2s ease;
    margin-left: 4px;
  }

  .section-header .chevron.expanded {
    transform: rotate(90deg);
  }

  .detail-rows {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.25s ease;
  }

  .detail-rows.expanded {
    max-height: 200px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 12.5px;
  }

  .detail-label {
    color: rgba(255, 255, 255, 0.55);
  }

  .detail-value {
    color: rgba(255, 255, 255, 0.85);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .detail-row.total {
    border-top: 0.5px solid rgba(255, 255, 255, 0.06);
    margin-top: 4px;
    padding-top: 8px;
  }

  .detail-row.total .detail-label,
  .detail-row.total .detail-value {
    color: #fff;
    font-weight: 600;
  }

  /* Settings gear */
  .settings-wrap {
    position: absolute;
    bottom: 12px;
    right: 12px;
    z-index: 50;
    /* no shadow — causes transparent frame artifacts on WebView */
  }

  .settings-btn {
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0.25;
    transition: opacity 0.15s;
    padding: 2px;
    line-height: 1;
    display: flex;
    align-items: center;
  }

  .settings-btn:hover {
    opacity: 0.6;
  }

  .settings-btn svg {
    width: 14px;
    height: 14px;
  }

  .settings-menu {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 4px;
    background: #323234;
    border: none;
    outline: none;
    border-radius: 0;
    min-width: 170px;
    padding: 4px 0;
    z-index: 100;
    -webkit-mask-image: -webkit-radial-gradient(white, black);
    clip-path: inset(0 round 8px);
    box-shadow: none;
  }

  .settings-menu.open {
    display: block;
  }

  .settings-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.75);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    width: 100%;
    text-align: left;
    transition: background 0.1s;
  }

  .settings-item:hover {
    background: rgba(255, 255, 255, 0.08);
  }

  .settings-sep {
    height: 0.5px;
    background: rgba(255, 255, 255, 0.08);
    margin: 4px 0;
  }

  .settings-check {
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .settings-check.on {
    opacity: 1;
  }

  .settings-item.danger {
    color: rgba(255, 69, 58, 0.85);
  }

  /* Update banner */
  .version-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.25);
    font-variant-numeric: tabular-nums;
  }

  .update-banner {
    display: none;
    padding: 10px 16px;
    background: rgba(88, 86, 214, 0.15);
    border-bottom: 0.5px solid rgba(88, 86, 214, 0.3);
    cursor: pointer;
    transition: background 0.15s;
  }

  .update-banner.visible {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .update-banner:hover {
    background: rgba(88, 86, 214, 0.25);
  }

  .update-banner-text {
    font-size: 12.5px;
    color: #A5A4F3;
    flex: 1;
  }

  .update-banner-action {
    font-size: 12px;
    font-weight: 600;
    color: #5856D6;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .update-banner-action:hover {
    background: rgba(88, 86, 214, 0.2);
  }

</style>
</head>
<body>
  <div class="popover">
    <div class="header">
      <span class="header-title">Claude Code</span>
      <span class="badge" id="plan-badge">Max</span>
      <span class="badge live" id="source-badge">Live</span>
      <span style="flex:1"></span>
      <span class="version-label" id="version-label"></span>
    </div>

    <!-- Update banner -->
    <div class="update-banner" id="update-banner" onclick="applyUpdate()">
      <span class="update-banner-text" id="update-text">Update available</span>
      <button class="update-banner-action" id="update-btn">Update</button>
    </div>

    <!-- Auth required state -->
    <div class="auth-required" id="auth-section">
      <div class="auth-icon">&#x1F511;</div>
      <div class="auth-title">Login Required</div>
      <div class="auth-desc">
        Claude Code login is needed to fetch<br>
        your rate limit data.
      </div>
      <button class="auth-btn" onclick="window.ipc.postMessage('auth_login')">
        Login with Claude Code
      </button>
    </div>

    <!-- Connecting state -->
    <div class="connecting-state" id="connecting-section">
      <div class="connecting-spinner">&#x1F4E1;</div>
      <div class="connecting-text">Connecting to API...</div>
      <div class="error-message" id="error-message"></div>
      <button class="relogin-btn" id="relogin-btn" onclick="window.ipc.postMessage('auth_login')" style="display:none">Re-login with Claude Code</button>
      <button class="error-detail-toggle" id="error-toggle" onclick="toggleErrorDetails()" style="display:none">Show details</button>
      <div class="error-details" id="error-details"></div>
    </div>

    <!-- Normal usage content -->
    <div class="usage-content" id="usage-section">
      <div class="section">
        <div class="section-header">
          <span class="section-icon">&#x23F1;</span>
          <span class="section-label">5-Hour Window</span>
          <span class="section-value safe" id="pct-value">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill safe" id="progress-bar" style="width: 0%"></div>
        </div>
        <div class="reset-text" id="reset-text">No active session</div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-icon">&#x1F4C5;</span>
          <span class="section-label">Weekly Limit</span>
          <span class="section-value safe" id="weekly-pct-value">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill safe" id="weekly-progress-bar" style="width: 0%"></div>
        </div>
        <div class="sub-stats">
          <span class="reset-text" id="weekly-reset-text">No activity</span>
          <span class="reset-text" id="weekly-tokens-text"></span>
        </div>
      </div>

    </div>

    <!-- Settings gear (bottom-right) -->
    <div class="settings-wrap">
      <button class="settings-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15 1.65 1.65 0 003 14.08V14a2 2 0 010-4v.09c.04-.9-.6-1.7-1.51-1.82A1.65 1.65 0 004.6 9l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06c.5.5 1.2.7 1.82.33H9c.77-.36 1.27-1.12 1.24-1.95V3a2 2 0 014 0v.09c-.03.83.47 1.59 1.24 1.95.62.37 1.32.17 1.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06c-.5.5-.7 1.2-.33 1.82V9c.36.77 1.12 1.27 1.95 1.24H21a2 2 0 010 4h-.09"/>
        </svg>
      </button>
      <div class="settings-menu">
        <button class="settings-item" onclick="closeSettingsMenu(); window.ipc.postMessage('open_usage')">View Usage Dashboard</button>
        <button class="settings-item" id="check-update-item" onclick="checkForUpdates()">Check for Updates</button>
        <div class="settings-sep"></div>
        <button class="settings-item" id="autolaunch-item" onclick="toggleAutoLaunch()">
          <span>Launch at Login</span>
          <span class="settings-check" id="autolaunch-check">&#x2713;</span>
        </button>
        <div class="settings-sep"></div>
        <button class="settings-item danger" onclick="window.ipc.postMessage('quit')">Quit</button>
      </div>
    </div>

  </div>

<script>
function formatTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

function statusClass(pct) {
  if (pct >= 90) return 'danger';
  if (pct >= 70) return 'warning';
  return 'safe';
}

function updateData(d) {
  var authSection = document.getElementById('auth-section');
  var connectingSection = document.getElementById('connecting-section');
  var usageSection = document.getElementById('usage-section');
  var srcBadge = document.getElementById('source-badge');

  // State 1: Auth missing → show login prompt
  if (d.auth_missing) {
    authSection.className = 'auth-required visible';
    connectingSection.className = 'connecting-state';
    usageSection.style.display = 'none';
    srcBadge.style.display = 'none';
    requestAnimationFrame(function() {
      var h = document.querySelector('.popover').scrollHeight;
      window.ipc.postMessage('resize:' + h);
    });
    return;
  }

  // State 2: Not live — but may have cached data from last success
  if (!d.is_live) {
    var hasCached = d.five_hour_percent != null;
    if (!hasCached) {
      // No cached data at all → show connecting spinner
      authSection.className = 'auth-required';
      connectingSection.className = 'connecting-state visible';
      usageSection.style.display = 'none';
      srcBadge.textContent = '...';
      srcBadge.className = 'badge connecting';
      srcBadge.style.display = '';

      var errMsg = document.getElementById('error-message');
      var errToggle = document.getElementById('error-toggle');
      var errDetails = document.getElementById('error-details');
      if (d.error_message) {
        var isRateLimit = d.error_message.indexOf('429') !== -1 || d.error_message.indexOf('Rate limit') !== -1;
        if (isRateLimit) {
          document.querySelector('.connecting-spinner').textContent = '\u23F3';
          document.querySelector('.connecting-text').textContent = 'Waiting for API...';
          if (d.retry_at) {
            startRetryCountdown(d.retry_at, errMsg);
          } else {
            errMsg.textContent = 'Auto-recovers in a few minutes';
          }
          errMsg.className = 'error-message soft';
          // Show re-login button after multiple retries
          var reloginBtn = document.getElementById('relogin-btn');
          if (d.retry_count >= 2) {
            reloginBtn.style.display = '';
          } else {
            reloginBtn.style.display = 'none';
          }
        } else {
          document.querySelector('.connecting-spinner').textContent = '\uD83D\uDCE1';
          document.querySelector('.connecting-text').textContent = 'Connecting to API...';
          errMsg.textContent = d.error_message;
          errMsg.className = 'error-message';
          document.getElementById('relogin-btn').style.display = 'none';
        }
        errMsg.style.display = '';
        if (d.error_detail || d.retry_count > 0) {
          errToggle.style.display = '';
          var detailText = '';
          if (d.error_detail) detailText += d.error_detail;
          if (d.retry_count > 0) detailText += (detailText ? '\n' : '') + 'Retries: ' + d.retry_count;
          errDetails.textContent = detailText;
        } else {
          errToggle.style.display = 'none';
          errDetails.className = 'error-details';
        }
      } else {
        errMsg.textContent = '';
        errMsg.style.display = 'none';
        errToggle.style.display = 'none';
        errDetails.className = 'error-details';
        document.getElementById('relogin-btn').style.display = 'none';
      }
      // Resize popover to fit content
      requestAnimationFrame(function() {
        var h = document.querySelector('.popover').scrollHeight;
        window.ipc.postMessage('resize:' + h);
      });
      return;
    }
    // Has cached data → show it with "Retrying" badge, fall through to rendering
    srcBadge.textContent = 'Retrying';
    srcBadge.className = 'badge connecting';
    srcBadge.title = d.error_message ? d.error_message + ' — auto-recovers shortly' : '';
    srcBadge.style.display = '';
  }

  // State 3: Live or stale-with-cached data
  authSection.className = 'auth-required';
  connectingSection.className = 'connecting-state';
  usageSection.style.display = '';
  if (d.is_live) {
    srcBadge.textContent = 'Live';
    srcBadge.className = 'badge live';
  }
  // If stale (is_live=false with cached data), badge was already set to "Stale" above
  srcBadge.style.display = '';

  var h5pct = (d.five_hour_percent != null) ? d.five_hour_percent : 0;
  var w7pct = (d.seven_day_percent != null) ? d.seven_day_percent : 0;

  // 5-hour percentage
  var cls = statusClass(h5pct);
  var pctEl = document.getElementById('pct-value');
  pctEl.textContent = h5pct + '%';
  pctEl.className = 'section-value ' + cls;

  // Progress bar
  var bar = document.getElementById('progress-bar');
  bar.style.width = Math.min(h5pct, 100) + '%';
  bar.className = 'progress-fill ' + cls;

  // Reset text
  var resetText = 'No active session';
  if (d.five_hour_resets_at) {
    resetText = formatResetTime(d.five_hour_resets_at);
  }
  document.getElementById('reset-text').textContent = resetText;

  // Weekly
  var wCls = statusClass(w7pct);
  var wPctEl = document.getElementById('weekly-pct-value');
  wPctEl.textContent = w7pct + '%';
  wPctEl.className = 'section-value ' + wCls;

  var wBar = document.getElementById('weekly-progress-bar');
  wBar.style.width = Math.min(w7pct, 100) + '%';
  wBar.className = 'progress-fill ' + wCls;

  var weeklyResetText = 'No activity';
  if (d.seven_day_resets_at) {
    weeklyResetText = formatResetTime(d.seven_day_resets_at);
  }
  document.getElementById('weekly-reset-text').textContent = weeklyResetText;
  document.getElementById('weekly-tokens-text').textContent = '';

  // Resize popover to fit content
  requestAnimationFrame(function() {
    var h = document.querySelector('.popover').scrollHeight;
    window.ipc.postMessage('resize:' + h);
  });
}

function setVersion(v) {
  document.getElementById('version-label').textContent = 'v' + v;
}

function showUpdateBanner(version) {
  var banner = document.getElementById('update-banner');
  document.getElementById('update-text').textContent = 'Update available: v' + version;
  banner.className = 'update-banner visible';
  // Reset check button state
  var item = document.getElementById('check-update-item');
  item.textContent = 'Check for Updates';
  item.style.opacity = '';
  item.style.pointerEvents = '';
}

function setAutoLaunch(enabled) {
  var check = document.getElementById('autolaunch-check');
  check.className = enabled ? 'settings-check on' : 'settings-check';
}

// Hover-based settings menu with window resize
(function() {
  var wrap = document.querySelector('.settings-wrap');
  var menu = document.querySelector('.settings-menu');
  var hideTimer = null;

  var popoverEl = document.querySelector('.popover');

  wrap.addEventListener('mouseenter', function() {
    if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
    menu.classList.add('open');
    // Remove bottom border-radius so no transparent gap shows
    popoverEl.style.borderBottomLeftRadius = '0';
    popoverEl.style.borderBottomRightRadius = '0';
    // Expand window to fit menu below
    requestAnimationFrame(function() {
      var menuRect = menu.getBoundingClientRect();
      var needed = menuRect.bottom + 8;
      window.ipc.postMessage('resize:' + needed);
    });
  });

  wrap.addEventListener('mouseleave', function() {
    hideTimer = setTimeout(function() {
      // Shrink window FIRST, then hide menu after window has resized
      var btn = document.querySelector('.settings-wrap .settings-btn');
      var h = btn ? btn.getBoundingClientRect().bottom + 12 : popoverEl.scrollHeight;
      window.ipc.postMessage('resize:' + h);
      // Restore border-radius and hide menu after window shrinks
      setTimeout(function() {
        menu.classList.remove('open');
        popoverEl.style.borderBottomLeftRadius = '';
        popoverEl.style.borderBottomRightRadius = '';
      }, 50);
    }, 200);
  });
})();

function checkForUpdates() {
  var item = document.getElementById('check-update-item');
  item.textContent = 'Checking...';
  item.style.opacity = '0.5';
  item.style.pointerEvents = 'none';
  window.ipc.postMessage('check_update');
}

function showUpToDate() {
  var item = document.getElementById('check-update-item');
  item.textContent = 'Up to date \u2713';
  item.style.opacity = '1';
  setTimeout(function() {
    item.textContent = 'Check for Updates';
    item.style.opacity = '';
    item.style.pointerEvents = '';
  }, 3000);
}

function toggleAutoLaunch() {
  var check = document.getElementById('autolaunch-check');
  var isOn = check.classList.contains('on');
  check.className = isOn ? 'settings-check' : 'settings-check on';
  window.ipc.postMessage('toggle_launch_at_login');
}

function toggleTokenDetails() {
  var details = document.getElementById('token-details');
  var chevron = document.getElementById('token-chevron');
  if (details.classList.contains('expanded')) {
    details.className = 'detail-rows';
    chevron.className = 'chevron';
  } else {
    details.className = 'detail-rows expanded';
    chevron.className = 'chevron expanded';
  }
}

function applyUpdate() {
  var btn = document.getElementById('update-btn');
  var text = document.getElementById('update-text');
  btn.textContent = 'Updating...';
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';
  text.textContent = 'Downloading and installing...';
  window.ipc.postMessage('apply_update');
}

function toggleErrorDetails() {
  var details = document.getElementById('error-details');
  var toggle = document.getElementById('error-toggle');
  if (details.classList.contains('visible')) {
    details.className = 'error-details';
    toggle.textContent = 'Show details';
  } else {
    details.className = 'error-details visible';
    toggle.textContent = 'Hide details';
  }
}

var _retryTimer = null;
function startRetryCountdown(isoStr, el) {
  if (_retryTimer) clearInterval(_retryTimer);
  function update() {
    var diff = new Date(isoStr) - new Date();
    if (diff <= 0) {
      el.textContent = 'Retrying now...';
      clearInterval(_retryTimer);
      _retryTimer = null;
      return;
    }
    var m = Math.floor(diff / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    el.textContent = 'Retrying in ' + m + ':' + String(s).padStart(2, '0');
  }
  update();
  _retryTimer = setInterval(update, 1000);
}

function formatResetTime(isoStr) {
  try {
    var reset = new Date(isoStr);
    var now = new Date();
    var diffMs = reset - now;
    if (diffMs <= 0) return 'Window clear';
    var totalMin = Math.floor(diffMs / 60000);
    var h = Math.floor(totalMin / 60);
    var m = totalMin % 60;
    if (h > 24) {
      var d = Math.floor(h / 24);
      h = h % 24;
      return 'Resets in: ' + d + 'd ' + h + 'h ' + String(m).padStart(2, '0') + 'm';
    }
    return 'Resets in: ' + h + 'h ' + String(m).padStart(2, '0') + 'm';
  } catch (e) {
    return isoStr;
  }
}
