name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/claude-code-rate-watcher \
            target/x86_64-apple-darwin/release/claude-code-rate-watcher \
            -output claude-code-rate-watcher

      - name: Package
        run: |
          tar czf claude-code-rate-watcher-macos-universal.tar.gz claude-code-rate-watcher

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-code-rate-watcher-macos-universal.tar.gz
          generate_release_notes: true
