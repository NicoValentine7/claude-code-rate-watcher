name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/ccrw \
            target/x86_64-apple-darwin/release/ccrw \
            -output ccrw

      - name: Package tarball
        run: |
          tar czf claude-code-rate-watcher-macos-universal.tar.gz ccrw

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-code-rate-watcher-macos-universal.tar.gz
          generate_release_notes: true

      - name: Update Homebrew Formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 claude-code-rate-watcher-macos-universal.tar.gz | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/NicoValentine7/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i '' "s|url \".*\"|url \"https://github.com/NicoValentine7/claude-code-rate-watcher/releases/download/v${VERSION}/claude-code-rate-watcher-macos-universal.tar.gz\"|" Formula/claude-code-rate-watcher.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/claude-code-rate-watcher.rb
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Formula/claude-code-rate-watcher.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-code-rate-watcher.rb
          git commit -m "feat: v${VERSION} に自動更新"
          git push
