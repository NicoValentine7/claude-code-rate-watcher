name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/claude-code-rate-watcher \
            target/x86_64-apple-darwin/release/claude-code-rate-watcher \
            -output claude-code-rate-watcher

      - name: Package tarball
        run: |
          tar czf claude-code-rate-watcher-macos-universal.tar.gz claude-code-rate-watcher

      - name: Create pkg installer
        run: |
          mkdir -p pkg-root/payload
          cp claude-code-rate-watcher pkg-root/payload/

          mkdir -p pkg-root/scripts
          cat > pkg-root/scripts/postinstall << 'SCRIPT'
          #!/bin/bash
          INSTALL_DIR="$HOME/Applications/claude-code-rate-watcher"
          mkdir -p "$INSTALL_DIR"
          cp /tmp/claude-code-rate-watcher-install/claude-code-rate-watcher "$INSTALL_DIR/"
          chmod 755 "$INSTALL_DIR/claude-code-rate-watcher"
          rm -rf /tmp/claude-code-rate-watcher-install
          SCRIPT
          chmod +x pkg-root/scripts/postinstall

          pkgbuild \
            --root pkg-root/payload \
            --scripts pkg-root/scripts \
            --identifier com.claude-code-rate-watcher \
            --version ${GITHUB_REF_NAME#v} \
            --install-location /tmp/claude-code-rate-watcher-install \
            claude-code-rate-watcher.pkg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-code-rate-watcher-macos-universal.tar.gz
            claude-code-rate-watcher.pkg
          generate_release_notes: true
