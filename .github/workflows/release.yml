name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Build arm64 binary
        run: swift build -c release --triple arm64-apple-macosx13.0

      - name: Build x86_64 binary
        run: swift build -c release --triple x86_64-apple-macosx13.0

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/ccrw \
            .build/x86_64-apple-macosx/release/ccrw \
            -output .build/universal-ccrw

      - name: Build app bundle
        run: |
          chmod +x scripts/build_app.sh
          APP_PATH="$(./scripts/build_app.sh release)"
          cp .build/universal-ccrw "${APP_PATH}/Contents/MacOS/ccrw"
          echo "v${GITHUB_REF_NAME#v}" > dist/VERSION
          tar czf claude-code-rate-watcher-macos-app.tar.gz -C dist "Claude Code Rate Watcher.app" VERSION

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-code-rate-watcher-macos-app.tar.gz
          generate_release_notes: false

      - name: Update Homebrew Formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 claude-code-rate-watcher-macos-app.tar.gz | awk '{print $1}')

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/NicoValentine7/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/claude-code-rate-watcher.rb << 'FORMULA'
          class ClaudeCodeRateWatcher < Formula
            desc "macOS menu bar app to monitor Claude Code API rate limits"
            homepage "https://nicovalentine7.github.io/claude-code-rate-watcher/"
            url "URL_PLACEHOLDER"
            sha256 "SHA_PLACEHOLDER"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            depends_on :macos

            def install
              prefix.install "Claude Code Rate Watcher.app"
              bin.write_exec_script prefix/"Claude Code Rate Watcher.app/Contents/MacOS/ccrw"
            end

            def caveats
              <<~EOS
                Claude Code Rate Watcher has been installed as an app bundle.

                To start, run:
                  ccrw

                Or open from:
                  #{prefix}/Claude Code Rate Watcher.app

                Launch at Login is enabled automatically on first run.
                You can toggle it off in the popover menu.

                To uninstall completely:
                  brew uninstall claude-code-rate-watcher
                  rm -f ~/Library/LaunchAgents/com.claude-code-rate-watcher.plist
              EOS
            end

            test do
              assert_predicate prefix/"Claude Code Rate Watcher.app", :exist?
            end
          end
          FORMULA

          sed -i '' "s|URL_PLACEHOLDER|https://github.com/NicoValentine7/claude-code-rate-watcher/releases/download/v${VERSION}/claude-code-rate-watcher-macos-app.tar.gz|" Formula/claude-code-rate-watcher.rb
          sed -i '' "s|SHA_PLACEHOLDER|${SHA256}|" Formula/claude-code-rate-watcher.rb
          sed -i '' "s|VERSION_PLACEHOLDER|${VERSION}|" Formula/claude-code-rate-watcher.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-code-rate-watcher.rb
          git commit -m "feat: v${VERSION} に自動更新（.app バンドル配布に移行）"
          git push
