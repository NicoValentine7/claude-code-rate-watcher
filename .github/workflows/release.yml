name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/claude-code-rate-watcher \
            target/x86_64-apple-darwin/release/claude-code-rate-watcher \
            -output claude-code-rate-watcher

      - name: Create .app bundle
        run: |
          APP="Claude Code Rate Watcher.app"
          mkdir -p "$APP/Contents/MacOS"
          cp claude-code-rate-watcher "$APP/Contents/MacOS/"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>Claude Code Rate Watcher</string>
            <key>CFBundleDisplayName</key>
            <string>Claude Code Rate Watcher</string>
            <key>CFBundleIdentifier</key>
            <string>com.claude-code-rate-watcher</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleExecutable</key>
            <string>claude-code-rate-watcher</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>
          PLIST

      - name: Ad-hoc code sign
        run: codesign --force --deep -s - "Claude Code Rate Watcher.app"

      - name: Package tarball
        run: |
          tar czf claude-code-rate-watcher-macos-universal.tar.gz claude-code-rate-watcher

      - name: Create DMG
        run: |
          mkdir dmg-staging
          cp -R "Claude Code Rate Watcher.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "Claude Code Rate Watcher" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            claude-code-rate-watcher.dmg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-code-rate-watcher-macos-universal.tar.gz
            claude-code-rate-watcher.dmg
          generate_release_notes: true
